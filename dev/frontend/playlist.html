<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="./style.css" />
    <title>Playlist</title>
  </head>
  <body>
    <div class="container">
      <h1>Playlist Info</h1>
      <div class="grid" style="gap: 50px">
			<div class="card" style="width: 110%">
			  <img
				src="./img/placeholder_album_art.jpg"
				alt="Playlist Cover"
				style="width: 100%; border-radius: 5px;"
			  />
			<div class="card">
			  <ul>
				<li><strong>Playlist:</strong> [Playlist name]</li>
				<li><strong>Listens:</strong> [# Listens]</li>
			  </ul>
			</div>
        </div>
		<ul>
			<li><strong>Song 1</strong> [Song Name]</li>
            <button class="button">Song 1</button>
			<li><strong>Song 2</strong> [Song Name]</li>
            <button class="button">Song 2</button>
			<li><strong>Song 3</strong> [Song Name]</li>
            <button class="button">Song 3</button>
		</ul>
     </div>
  </body>
</html>
