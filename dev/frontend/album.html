<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./album.js"></script>
    <title>Album</title>
  </head>
  <body>
    <div class="container">
      <h1>$ome $exy $ongs 4 U</h1>

      <div class="grid" style="gap: 50px">
        <!-- Album Art and Info -->
        <div class="card" style="width: 110%">
          <img
            src="./img/placeholder_album_art.jpg"
            alt="Album Cover"
            style="width: 100%; border-radius: 5px;"
          />
          <ul id="album-info">
            <!-- JavaScript will populate this -->
          </ul>
          <div>
            <button class="button">Rate</button>
            <button class="button">Like</button>
            <button class="button-gray">Review</button>
          </div>
        </div>

        <!-- Track List -->
        <div id="track-list">
          <!-- JavaScript will populate this -->
        </div>
      </div>

      <!-- Additional Album Recommendations -->
      <div class="section">
        <h2>Album 1</h2>
        <p>Placeholder Text 1</p>
        <h2>Album 2</h2>
        <p>Placeholder Text 2</p>
        <h2>Album 3</h2>
        <p>Placeholder Text 3</p>
      </div>
    </div>
  </body>
</html>
