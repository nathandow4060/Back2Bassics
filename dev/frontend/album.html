<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./album.js"></script>
    <title>Album</title>
  </head>
  <body>
	<div id="notification"></div>

    <div class="container">
      <!-- Home button separated -->
      <button id="home-btn" onclick="window.location.href='landing.html'" class="button-gray" style="float: right; margin: 10px 0;">
        🏠 Home
      </button>
      
	
      <h1 id="album-title">So Close To What</h1>

      <div class="grid" style="gap: 50px">
        <!-- Album Art and Info -->
        <div class="card" style="width: 110%">
          <img
            src="./img/placeholder_album_art.jpg?v=2"
            alt="Album Cover"
            style="width: 100%; border-radius: 5px;"
          />
          <ul id="album-info">
            <!-- JavaScript will populate this -->
          </ul>
          <div>
			<button class="button" id="album-rate-btn">Rate</button>
			<button class="button" id="album-like-btn">Like</button>
			<button class="button-gray" id="album-review-btn">Review</button>
		  </div>
        </div>

        <!-- Track List -->
        <div id="track-list">
          <!-- JavaScript will populate this -->
        </div>
      </div>

      <!-- reviews -->
      <div class="card">
		<h2>Reviews</h2>
		<div id="review-list">
		  <!-- Reviews will load here -->
		</div>
	  </div>
    </div>
	<div id="rating-modal" class="modal">
		<div class="modal-content">
		  <span id="close-rating" class="close">&times;</span>
		  <h3>Rate this Album</h3>
		  <input type="range" id="rating-slider" min="0" max="5" step="1" value="3" />
		  <p>Your Rating: <span id="rating-value">3</span></p>
		  <button id="submit-rating" class="button">Submit Rating</button>
		</div>
	  </div>
	  <div id="review-modal" class="modal">
		<div class="modal-content">
		  <span id="close-review" class="close">&times;</span>
		  <h3>Write a Review</h3>
		  <textarea id="review-text" rows="5" style="width: 100%; resize: vertical;" placeholder="Say something..."></textarea>
		  <br /><br />
		  <button id="submit-review" class="button">Submit Review</button>
		</div>
	  </div>
  </body>
</html>
