<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="./style.css" />
    <title>Album</title>
  </head>
  <body>
    <div class="container">
      <h1>Album Info</h1>
      <div class="grid">
        <div class="card">
          <ul>
            <li><strong>Album:</strong> [Album name]</li>
            <li><strong>Artist:</strong> [Artist name]</li>
            <li><strong>Release:</strong> [Release date]</li>
          </ul>
        </div>
        <div class="card">
          <img
            src="./img/placeholder_album_art.jpg"
            alt="Album Cover"
            style="width: 100%; border-radius: 5px;"
          />
        </div>
      </div>
    </div>
  </body>
</html>
