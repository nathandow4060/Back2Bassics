<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./login.js"></script>
    <title>Back2Bassics Login</title>
  </head>
  <body>
    <div class="container center">
      <h1>Welcome to Back2Bassics</h1>
      <div class="card">
        <label for="username">Username (Tag):</label><br />
        <input type="text" id="username" name="username" /><br /><br />

        <label for="password">Password:</label><br />
        <input type="password" id="password" name="password" /><br /><br />

        <button class="button" id="login-btn">Login</button>
        <p><a href="#">Create an account</a></p>
        <div id="login-error" style="color: red; margin-top: 10px; display: none;"></div>
      </div>
    </div>
    <div id="signup-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <span class="close" id="close-signup">&times;</span>
        <h2>Create an Account</h2>
    
        <label for="new-tag">Username (Tag):</label><br />
        <input type="text" id="new-tag" placeholder="@new_user" /><br /><br />
    
        <label for="full-name">Full Name:</label><br />
        <input type="text" id="full-name" placeholder="Jane Doe" /><br /><br />
    
        <label for="new-password">Password:</label><br />
        <input type="password" id="new-password" /><br /><br />
    
        <label for="confirm-password">Confirm Password:</label><br />
        <input type="password" id="confirm-password" /><br /><br />

        <p><strong>Are you a:</strong></p>
        <label><input type="radio" name="user-type" value="artist" /> Artist</label><br />
        <label><input type="radio" name="user-type" value="listener" /> Listener</label><br /><br />
    
        <button class="button" id="create-account-btn">Create Account</button>
        <div id="signup-error" style="color: red; margin-top: 10px;"></div>
      </div>
    </div>
    <div class="container center" id="forgot-username-container" style="margin-top: 50px;">
      <h2>Forgot Username</h2>
      <label for="full-name-forgot">Full Name:</label><br />
      <input type="text" id="full-name-forgot" placeholder="Jane Doe" /><br /><br />
    
      <label for="password-forgot">Password:</label><br />
      <input type="password" id="password-forgot" /><br /><br />
    
      <label for="new-tag-forgot">New Username (Tag):</label><br />
      <input type="text" id="new-tag-forgot" placeholder="@new_tag" /><br /><br />
    
      <button class="button" id="forgot-username-btn">Change Username</button>
      <div id="forgot-error" style="color: red; margin-top: 10px;"></div>
    </div>    
  </body>
</html>
